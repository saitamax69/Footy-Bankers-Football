name: Debug Flashscore

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install
        run: pip install requests

      - name: Debug Flashscore
        env:
          SPORTDB_API_KEY: ${{ secrets.SPORTDB_API_KEY }}
        run: python debug_flashscore.py
      - name: Find competition IDs
        env:
          SPORTDB_API_KEY: ${{ secrets.SPORTDB_API_KEY }}
        run: python debug_flashscore.py
